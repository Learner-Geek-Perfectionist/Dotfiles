# ============================================
# Pixi Home 项目配置
# 作为 home 目录的默认工具链
# ============================================
# 文档: https://pixi.sh/latest/

[workspace]
name = "home"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

# ============================================
# 依赖项
# ============================================

[dependencies]
# 基础系统工具
git = "*"
git-lfs = "*"
gh = "*"
curl = "*"
wget = "*"
zip = "*"
unzip = "*"
xz = "*"
rsync = "*"
coreutils = "*"
findutils = "*"
grep = "*"
sed = "*"
gawk = "*"
openssh = "*"
bash = "*"

# 编程语言运行时
python = "*"
pip = "*"
nodejs = "*"
go = "*"
ruby = "*"
lua = "*"
perl = "*"
luajit = "*"
rust = "*"
openjdk = "*"
gradle = "*"
kotlin = "*"

# LSP Servers
pyright = "*"
gopls = "*"
lua-language-server = "*"
jdtls = "*"

# 终端增强工具
ripgrep = "*"
fd-find = "*"
bat = "*"
eza = "*"
fzf = "*"
tree = "*"
dust = "*"
hyperfine = "*"
fastfetch = "*"
tmux = "*"
htop = "*"
less = "*"

# 开发工具
nvim = "*"
vim = "*"
jq = "*"
yq = "*"
graphviz = "*"
doxygen = "*"
chafa = "*"
tree-sitter-cli = "*"
z3-solver = "*"

# 代码格式化
go-shfmt = "*"
ruff = "*"

# LLVM/Clang 工具链
clang = "*"
clang-tools = "*"
lld = "*"
lldb = "*"
llvm-tools = "*"

# 加密
age = "*"

# 其他工具
tldr = "*"
direnv = "*"

# 构建工具
cxx-compiler = "*"
c-compiler = "*"
make = "*"
cmake = "*"
ninja = "*"
pkg-config = "*"
autoconf = "*"
automake = "*"
libtool = "*"

# 开发库
openssl = "*"
readline = "*"
zlib = "*"
ncurses = "*"
libffi = "*"
sqlite = "*"
yaml = "*"

# 压缩
lz4 = "*"
zstd = "*"
brotli = "*"
lzip = "*"

# 测试框架和库
gtest = "*"
benchmark = "*"
libboost-devel = "*"
