# ============================================
# 构建工具 (完全 Rootless!)
# ============================================

[envs.build-tools]
channels = ["conda-forge"]
[envs.build-tools.dependencies]
# C/C++ 编译器
cxx-compiler = "*"
c-compiler = "*"
# 构建工具
make = "*"
cmake = "*"
ninja = "*"
pkg-config = "*"
autoconf = "*"
automake = "*"
libtool = "*"
# 开发库
openssl = "*"
readline = "*"
zlib = "*"
ncurses = "*"
libffi = "*"
# 测试框架
gtest = "*"
# Boost 库
libboost-devel = "*"

[envs.build-tools.exposed]
gcc = "gcc"
"g++" = "g++"
make = "make"
cmake = "cmake"
ninja = "ninja"
"pkg-config" = "pkg-config"
