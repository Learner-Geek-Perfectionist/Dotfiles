# 所有文本文件用 VS Code 打开（而非弹出"执行"确认框）
# text/* 覆盖 text/plain, text/x-shellscript, text/x-python 等
# macOS 优先用 open -a，Linux 优先用 code，最后回退 xdg-open
protocol file
mime text/*
action launch --type=background -- sh -lc 'if command -v open >/dev/null 2>&1; then open -a "Visual Studio Code" "$1"; elif command -v code >/dev/null 2>&1; then code --reuse-window "$1"; elif command -v xdg-open >/dev/null 2>&1; then xdg-open "$1"; else exit 1; fi' sh ${FILE_PATH}
