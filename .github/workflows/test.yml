name: Test

on:
  push:
    branches:
      - beta
      - main
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck lua5.4

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install shellcheck lua

      - name: Make test scripts executable
        run: |
          chmod +x scripts/test_helpers.sh
          chmod +x scripts/test_static.sh
          chmod +x scripts/test_smoke.sh

      - name: Run static checks
        run: ./scripts/test_static.sh

      - name: Run smoke checks
        run: ./scripts/test_smoke.sh
