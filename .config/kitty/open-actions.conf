# 所有文本文件用 VS Code 打开（而非弹出"执行"确认框）
# text/* 覆盖 text/plain, text/x-shellscript, text/x-python 等
# 按操作系统选择打开方式，避免 Linux 因 PATH 中存在 open 而误走 macOS 分支
protocol file
mime text/*
action launch --type=background -- sh -lc 'if [ "$(uname -s)" = "Darwin" ]; then open -a "Visual Studio Code" "$1"; elif command -v code >/dev/null 2>&1; then code --reuse-window "$1"; elif command -v xdg-open >/dev/null 2>&1; then xdg-open "$1"; else exit 1; fi' sh ${FILE_PATH}
